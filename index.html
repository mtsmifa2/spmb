<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPMB Online MTs. Miftahul Falah 2</title>
  <style>
    /* Desain minimalis & modern */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      background-color: #f9f9f9;
    }
    header {
      text-align: center;
      margin-bottom: 50px;
    }
    h1 {
      font-size: 2.5rem;
      color: #111;
      margin-bottom: 10px;
    }
    #loading {
      text-align: center;
      color: #666;
      font-style: italic;
    }
    .post-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      margin-bottom: 30px;
      transition: transform 0.2s;
    }
    .post-card:hover {
      transform: translateY(-2px);
    }
    .post-title {
      font-size: 1.8rem;
      margin: 0 0 10px 0;
      color: #222;
    }
    .post-date {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 20px;
    }
    .post-content {
      font-size: 1.1rem;
      color: #444;
    }
  </style>
</head>
<body>

  <header>
    <h1>SPMB Online</h1>
    <p>Aplikasi terbaru yang disinkronkan langsung dari Google Apps Script</p>
  </header>

  <div id="loading">Memuat Aplikasi terbaru...</div>
  <main id="blog-posts"></main>

  <script>
    // MASUKKAN URL WEB APP GAS ANDA DI SINI
    const API_URL = "https://script.google.com/macros/s/AKfycbyarvR3xMFqqMcM702v3ZTwh7U6tj3U6W9UbyC93TpYR592mqo2wmPUsGzKGzAxOhuONw/exec";

    async function loadPosts() {
      const container = document.getElementById('blog-posts');
      const loading = document.getElementById('loading');

      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error("Gagal memuat data dari API");
        
        const posts = await response.json();
        loading.style.display = 'none';

        if (posts.length === 0) {
          container.innerHTML = '<p style="text-align:center;">Belum ada artikel yang dipublikasikan.</p>';
          return;
        }

        // Tampilkan artikel dari yang terbaru (urutan terbalik)
        let htmlContent = '';
        for (let i = posts.length - 1; i >= 0; i--) {
          htmlContent += `
            <article class="post-card">
              <h2 class="post-title">${posts[i].judul}</h2>
              <div class="post-date">Diterbitkan pada: ${posts[i].tanggal}</div>
              <div class="post-content">${posts[i].konten}</div>
            </article>
          `;
        }
        container.innerHTML = htmlContent;

      } catch (error) {
        console.error(error);
        loading.innerHTML = "Gagal memuat artikel. Silakan coba beberapa saat lagi.";
      }
    }

    // Jalankan fungsi saat halaman dimuat
    loadPosts();
  </script>
</body>
</html>
